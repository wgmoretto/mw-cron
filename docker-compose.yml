# EasyPanel-compatible docker-compose
# Deploy: connect repo in EasyPanel → it auto-detects this compose

services:
  mw-cron:
    build: .
    restart: always
    ports:
      - "${PORT:-3847}:3847"
    environment:
      - PORT=3847
      - DB_PATH=/app/data/mw-cron.db
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-32-char-string}
    volumes:
      - mw-cron-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3847/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mw-cron-data:
    driver: local
