# EasyPanel-compatible docker-compose

services:
  app:
    build: .
    restart: always
    expose:
      - "80"
    environment:
      - PORT=80
      - DB_PATH=/app/data/mw-cron.db
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-32-char-string}
    volumes:
      - mw-cron-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:80/login').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mw-cron-data:
    driver: local
